name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      - name: Verify build artifacts
        run: |
          test -f packages/core/dist/index.js          || (echo "MISSING: core/dist/index.js" && exit 1)
          test -f packages/cli/dist/index.js           || (echo "MISSING: cli/dist/index.js" && exit 1)
          test -f packages/adapter-clickup/dist/index.js || (echo "MISSING: adapter-clickup/dist/index.js" && exit 1)
          test -f packages/mcp-server/dist/index.js    || (echo "MISSING: mcp-server/dist/index.js" && exit 1)
          echo "All dist artifacts present"

      - name: Create Version PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
